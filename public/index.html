<!DOCTYPE html>
<html>
<head>
  <title>Discord World Map</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    body { margin:0; }
    #map { height:100vh; width:100vw; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
const map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const markers = L.markerClusterGroup();
let heatPoints = [];

// ⚠️ HIER DEINE RENDER URL EINTRAGEN
const API_URL = "https://wyoucomefrom.onrender.com/locations";

async function loadLocations() {
  const res = await fetch(API_URL);
  const users = await res.json();

  users.forEach(user => {
    const marker = L.marker([user.lat, user.lon])
      .bindPopup(`<b>${user.username}</b><br>${user.location}`);

    markers.addLayer(marker);
    heatPoints.push([user.lat, user.lon, 0.7]);
  });

  map.addLayer(markers);

  const heat = L.heatLayer(heatPoints, {
    radius: 25,
    blur: 15
  }).addTo(map);
}

loadLocations();
</script>

</body>
</html>
